name: Deploy via SFTP + IndexNow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # Configure these secrets in your GitHub repo Settings → Secrets:
      # SFTP_HOST: your hosting SFTP hostname
      # SFTP_USER: your SFTP username
      # SFTP_PASSWORD: your SFTP password
      # INDEXNOW_KEY: your IndexNow key (from console.bing.com/webmaster)
      # SITE_URL: your full site URL (e.g. https://yourdomain.com)
      - name: Deploy via SFTP (lftp)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          if [ -z "$SFTP_HOST" ]; then
            echo "⚠️  SFTP_HOST secret not configured — skipping deployment."
            echo "    Add SFTP_HOST, SFTP_USER, SFTP_PASSWORD in Settings → Secrets → Actions."
            exit 0
          fi
          lftp -c "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 3;
            open sftp://$SFTP_USER:$SFTP_PASSWORD@$SFTP_HOST;
            mirror --reverse --delete \
              --exclude-glob=.git \
              --exclude-glob=.github \
              --exclude-glob=.claude \
              --exclude-glob=.agent \
              --exclude-glob=.agents \
              --exclude-glob=.DS_Store \
              --exclude-glob='*.bak*' \
              --exclude-glob=skills-lock.json \
              --exclude-glob='*.mp4' \
              --exclude-glob='*.mov' \
              ./ /;
          "

      - name: Notify IndexNow (Bing/Yandex instant indexing)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "⚠️  INDEXNOW_KEY secret not configured — skipping IndexNow notification."
            exit 0
          fi
          curl -s "https://api.indexnow.org/indexnow?url=${SITE_URL}%2F&key=${INDEXNOW_KEY}" \
            -o /dev/null -w "IndexNow status: %{http_code}\n"
